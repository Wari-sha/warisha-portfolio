<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0b0f1a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, Helvetica, sans-serif;
        }

        .thankyou-box{
            text-align:center;
        }

        .thankyou-box img{
            width:500px;
            max-width:90%;
            border-radius:20px;
            box-shadow:0 0 30px rgba(130,87,229,.5);
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:12px 30px;
            background:#7c3aed;
            color:#fff;
            text-decoration:none;
            border-radius:30px;
            font-size:18px;
            transition:.3s;
        }

        .btn:hover{
            background:#9f67ff;
            transform:translateY(-3px);
        }
    </style>
</head>

<body>

    <div class="thankyou-box">

        <img src="images/thankyou.png" alt="Thank You">

        <br>

        <a href="index.html" class="btn">← Back to Portfolio</a>

    </div>

</body>
</html>
